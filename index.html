<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveSG</title>
  <meta name="description" content="MoveSG: your personalized fitness map for Singapore — basketball courts, parks, park connectors and swimming pools near you." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <!-- Set the theme before first paint to avoid a flash of the wrong colors. -->
  <script>
    (function () {
      var saved = localStorage.getItem("movesg-theme");
      var dark = saved
        ? saved === "dark"
        : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      if (dark) document.querySelector('meta[name="theme-color"]').setAttribute("content", "#0e131b");
    })();
  </script>

  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://basemaps.cartocdn.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <aside class="sidebar" aria-label="Places near you">
      <div class="sidebar-head">
        <form id="search-form" class="search-row" role="search">
          <span class="search-field">
            <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="m20 20-3.2-3.2" />
            </svg>
            <input
              id="address-input"
              class="address-input"
              type="text"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="Postal code, street or place"
              aria-label="Search for a location"
              role="combobox"
              aria-expanded="false"
              aria-autocomplete="list"
              aria-controls="search-suggestions"
            />
            <button id="search-clear" class="search-clear" type="button" title="Clear" aria-label="Clear search" hidden>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
              </svg>
            </button>
            <ul id="search-suggestions" class="search-suggestions" role="listbox" aria-label="Location suggestions" hidden></ul>
          </span>
          <button id="locate-btn" class="locate-btn" type="button" title="Use my location" aria-label="Use my location">
            <svg class="locate-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3.2" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
            </svg>
          </button>
        </form>

        <p class="sidebar-origin-row">
          <svg class="origin-glyph" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 21s-7-5.4-7-11a7 7 0 0 1 14 0c0 5.6-7 11-7 11Z" />
            <circle cx="12" cy="10" r="2.4" />
          </svg>
          <span id="nearby-origin" class="sidebar-origin">Central Singapore</span>
        </p>
      </div>

      <div class="toolbar" id="toolbar">
        <div class="toolbar-head">
          <span class="toolbar-label">Filters</span>
          <button id="toolbar-toggle" class="toolbar-toggle" type="button" aria-expanded="true" aria-controls="layer-toggles" title="Collapse filters">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6" /></svg>
          </button>
        </div>
        <div id="layer-toggles" class="layer-toggles"></div>
      </div>

      <div class="results-head">
        <span class="results-label">Nearby</span>
      </div>
      <ul id="nearby-list" class="nearby-list" aria-live="polite"></ul>
    </aside>

    <div class="map-area">
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark theme" title="Switch to dark theme">
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
        </svg>
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" />
        </svg>
      </button>
      <div id="map" class="map" aria-label="Map of fitness places in Singapore"></div>
      <p id="status" class="status" role="status"></p>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>

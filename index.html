<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoveSG — your fitness map for Singapore</title>
  <meta name="description" content="MoveSG: your personalized fitness map for Singapore — basketball courts, parks, park connectors and swimming pools near you." />

  <link rel="preconnect" href="https://unpkg.com" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">📍</span>
      <div>
        <h1>MoveSG</h1>
        <p class="tagline">Courts, parks, connectors &amp; pools near you</p>
      </div>
    </div>
    <button id="locate-btn" class="locate-btn" type="button">
      📍 Near me
    </button>
  </header>

  <div class="toolbar">
    <span class="toolbar-label">Show:</span>
    <div id="layer-toggles" class="layer-toggles"></div>
  </div>

  <main class="layout">
    <div id="map" class="map" aria-label="Map of fitness places in Singapore"></div>
  </main>

  <p id="status" class="status" role="status"></p>

  <footer class="app-footer">
    Map &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> ·
    Parks &amp; connectors from <a href="https://data.gov.sg/" target="_blank" rel="noopener">data.gov.sg</a> (NParks) ·
    Courts &amp; pools from Google.
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
